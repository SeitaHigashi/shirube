name: Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required to count commits for version numbering
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Compute version
        run: |
          COUNT=$(git rev-list --count HEAD)
          VERSION="0.1.${COUNT}"
          TAG="v${VERSION}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=${TAG}"         >> "$GITHUB_ENV"
          # Update Cargo.toml so CARGO_PKG_VERSION in the binary matches the release tag.
          # This is necessary because the local pre-commit hook uses the dev branch commit
          # count, which differs from the main branch count used here.
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu --bin shirube

      - name: Package binary
        run: |
          ASSET="shirube-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar czf "${ASSET}" \
            -C target/x86_64-unknown-linux-gnu/release \
            shirube
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: ${{ env.ASSET }}
          generate_release_notes: true
