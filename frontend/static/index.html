<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>導 Dashboard</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; font-size: 14px; }
    header { background: #16213e; padding: 12px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #0f3460; }
    header h1 { font-size: 18px; color: #e94560; }
    #ticker-info { margin-left: auto; display: flex; gap: 24px; }
    .stat { text-align: right; }
    .stat-label { color: #888; font-size: 11px; }
    .stat-value { font-size: 16px; font-weight: bold; }
    .up { color: #26a69a; }
    .down { color: #ef5350; }
    .neutral { color: #e0e0e0; }
    main { display: grid; grid-template-columns: 1fr 320px; grid-template-rows: auto auto 1fr; gap: 12px; padding: 12px; height: calc(100vh - 56px); }
    #chart-container { background: #16213e; border-radius: 8px; padding: 12px; grid-row: 1 / 4; display: flex; flex-direction: column; }
    #chart-header { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    #chart-title { font-size: 13px; color: #888; }
    #indicator-bar { display: flex; gap: 12px; padding: 4px 0 6px; flex-wrap: wrap; }
    #indicator-bar label { font-size: 12px; color: #aaa; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 4px; }
    #indicator-bar input[type=checkbox] { cursor: pointer; accent-color: #26a69a; }
    #indicator-bar .ind-sma  { color: #f9c74f; }
    #indicator-bar .ind-ema  { color: #90e0ef; }
    #indicator-bar .ind-bb   { color: #c77dff; }
    #indicator-bar .ind-rsi  { color: #ff9e6d; }
    #indicator-bar .ind-macd { color: #a8dadc; }
    #indicator-bar .ind-news { color: #ffd166; }
    #chart { width: 100%; flex: 1; min-height: 0; }
    #rsi-chart  { width: 100%; height: 100px; display: none; margin-top: 4px; }
    #macd-chart { width: 100%; height: 110px; display: none; margin-top: 4px; }
    #rsi-label  { font-size: 10px; color: #ff9e6d; margin-top: 4px; display: none; }
    #macd-label { font-size: 10px; color: #a8dadc; margin-top: 4px; display: none; }
    .panel { background: #16213e; border-radius: 8px; padding: 12px; overflow-y: auto; }
    .panel h2 { font-size: 13px; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .balance-total { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; }
    .balance-total-label { color: #888; font-size: 0.85em; }
    .balance-total-amount { font-size: 1.2em; font-weight: bold; color: #e0e0e0; }
    .balance-item { background: #0f3460; border-radius: 6px; padding: 10px; }
    .balance-currency { font-size: 11px; color: #888; }
    .balance-amount { font-size: 18px; font-weight: bold; margin-top: 2px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { color: #888; font-weight: normal; text-align: left; padding: 4px 6px; border-bottom: 1px solid #0f3460; }
    td { padding: 4px 6px; border-bottom: 1px solid #1a1a2e; }
    .buy { color: #26a69a; }
    .sell { color: #ef5350; }
    #status-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0f3460; padding: 4px 16px; font-size: 11px; color: #888; display: flex; gap: 16px; }
    #ws-status { color: #ef5350; }
    #ws-status.connected { color: #26a69a; }
    #tz-toggle { background: #0f3460; color: #e0e0e0; border: 1px solid #26a69a; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    #tz-toggle:hover { background: #1a4a80; }
    body { padding-bottom: 32px; }
    #backtest-section { background: #16213e; margin: 12px; padding: 16px; border-radius: 8px; }
    #backtest-section h2 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    #backtest-section h3 { font-size: 12px; color: #888; margin: 12px 0 8px; }
    .bt-field-group { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
    .bt-field-group label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: #888; }
    .bt-field-group input { background: #0f3460; border: 1px solid #26a69a; color: #e0e0e0; padding: 4px 8px; border-radius: 4px; width: 180px; }
    #bt-run-btn { background: #e94560; color: #fff; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    #bt-run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #bt-loading { color: #26a69a; font-size: 12px; margin-left: 12px; }
    .bt-result-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 8px 0 12px; }
    .bt-metric { background: #0f3460; border-radius: 6px; padding: 10px; text-align: center; }
    .bt-metric-label { font-size: 10px; color: #888; }
    .bt-metric-value { font-size: 18px; font-weight: bold; margin-top: 4px; }
    .bt-positive { color: #26a69a; }
    .bt-negative { color: #ef5350; }
    .bt-neutral { color: #e0e0e0; }
    .bt-preset-group { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .bt-preset-btn { background: #0f3460; color: #e0e0e0; border: 1px solid #1a4a7a; border-radius: 4px; padding: 4px 12px; font-size: 12px; cursor: pointer; transition: background 0.15s; }
    .bt-preset-btn:hover { background: #1a4a7a; }
    .bt-preset-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
    #bt-custom-range { display: none; }
    #bt-range-label { font-size: 11px; color: #888; margin-left: 8px; }
    /* News panel */
    #news-section { background: #16213e; margin: 12px; padding: 16px; border-radius: 8px; }
    #news-section h2 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    #news-avg-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    #news-avg-label { font-size: 12px; color: #888; }
    #news-avg-score { font-size: 22px; font-weight: bold; }
    .news-item { padding: 8px 0; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 10px; }
    .news-item:last-child { border-bottom: none; }
    .news-score-badge { min-width: 48px; text-align: center; font-weight: bold; font-size: 13px; padding: 2px 6px; border-radius: 4px; }
    .news-score-bullish { background: rgba(38,166,154,0.2); color: #26a69a; }
    .news-score-bearish { background: rgba(239,83,80,0.2); color: #ef5350; }
    .news-score-neutral { background: rgba(255,255,255,0.05); color: #888; }
    .news-headline { font-size: 12px; color: #ccc; flex: 1; }
    #news-list { max-height: 300px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #0f3460 transparent; }
    #news-list::-webkit-scrollbar { width: 4px; }
    #news-list::-webkit-scrollbar-track { background: transparent; }
    #news-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }
    .news-time { font-size: 10px; color: #555; white-space: nowrap; }
    /* Settings panel */
    #settings-section { background: #16213e; margin: 12px; padding: 16px; border-radius: 8px; }
    #settings-section h2 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    #settings-section h3 { font-size: 12px; color: #888; margin: 12px 0 8px; }
    .settings-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
    .settings-field { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: #888; }
    .settings-field input { background: #0f3460; border: 1px solid #26a69a; color: #e0e0e0; padding: 4px 8px; border-radius: 4px; width: 160px; }
    #settings-save-btn { background: #26a69a; color: #fff; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    #settings-save-btn:hover { background: #1e8a7e; }
    #settings-save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #settings-msg { font-size: 12px; margin-left: 12px; }
    #settings-msg.ok { color: #26a69a; }
    #settings-msg.err { color: #ef5350; }
    /* Signal panel */
    #signal-composite { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #0f3460; }
    #signal-composite-label { font-size: 11px; color: #888; }
    #signal-composite-value { font-size: 20px; font-weight: bold; }
    #signal-confidence { font-size: 12px; color: #888; }
    .signal-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #1a1a2e; font-size: 12px; }
    .signal-row:last-child { border-bottom: none; }
    .signal-name { color: #888; min-width: 40px; }
    .signal-detail { color: #ccc; flex: 1; margin: 0 8px; font-size: 11px; }
    .signal-badge { font-weight: bold; font-size: 12px; min-width: 36px; text-align: right; }
    .signal-buy { color: #26a69a; }
    .signal-sell { color: #ef5350; }
    .signal-hold { color: #888; }
  </style>
</head>
<body>
  <header>
    <h1>導</h1>
    <span style="color:#888; font-size:12px;">BTC/JPY</span>
    <button id="tz-toggle">JST</button>
    <div id="ticker-info">
      <div class="stat">
        <div class="stat-label">最終価格</div>
        <div class="stat-value neutral" id="price">---</div>
      </div>
      <div class="stat">
        <div class="stat-label">BID</div>
        <div class="stat-value up" id="bid">---</div>
      </div>
      <div class="stat">
        <div class="stat-label">ASK</div>
        <div class="stat-value down" id="ask">---</div>
      </div>
      <div class="stat">
        <div class="stat-label">出来高</div>
        <div class="stat-value neutral" id="volume">---</div>
      </div>
    </div>
  </header>

  <main>
    <div id="chart-container">
      <div id="chart-header">
        <div id="chart-title">BTC/JPY — 1分足</div>
      </div>
      <div id="indicator-bar">
        <label><input type="checkbox" id="cb-sma"><span class="ind-sma">SMA</span></label>
        <label><input type="checkbox" id="cb-ema"><span class="ind-ema">EMA</span></label>
        <label><input type="checkbox" id="cb-bb"><span class="ind-bb">ボリンジャーバンド</span></label>
        <label><input type="checkbox" id="cb-rsi"><span class="ind-rsi">RSI</span></label>
        <label><input type="checkbox" id="cb-macd"><span class="ind-macd">MACD</span></label>
        <label><input type="checkbox" id="cb-news" checked><span class="ind-news">ニュース</span></label>
      </div>
      <div id="chart"></div>
      <div id="rsi-label">RSI</div>
      <div id="rsi-chart"></div>
      <div id="macd-label">MACD</div>
      <div id="macd-chart"></div>
    </div>
    <div class="panel" id="signal-panel">
      <h2>シグナル状態</h2>
      <div id="signal-composite">
        <span class="signal-composite-label">総合</span>
        <span id="signal-composite-value" class="signal-hold">---</span>
        <span id="signal-confidence"></span>
      </div>
      <div id="signal-rows"></div>
    </div>
    <div class="panel" id="balance-panel">
      <h2>残高</h2>
      <div class="balance-grid">
        <div class="balance-item">
          <div class="balance-currency">JPY</div>
          <div class="balance-amount neutral" id="jpy-balance">---</div>
        </div>
        <div class="balance-item">
          <div class="balance-currency">BTC</div>
          <div class="balance-amount neutral" id="btc-balance">---</div>
        </div>
      </div>
      <div class="balance-total">
        <span class="balance-total-label">総残高（円）</span>
        <span class="balance-total-amount" id="total-balance-jpy">---</span>
      </div>
    </div>
    <div class="panel" id="orders-panel">
      <h2>最近の注文</h2>
      <table>
        <thead><tr><th>方向</th><th>サイズ</th><th>価格</th><th>状態</th></tr></thead>
        <tbody id="orders-body"><tr><td colspan="4" style="color:#888;text-align:center">データなし</td></tr></tbody>
      </table>
    </div>
  </main>

  <section id="news-section">
    <h2>ニュースセンチメント (AI分析)</h2>
    <div id="news-avg-bar">
      <span class="news-avg-label">平均スコア:</span>
      <span id="news-avg-score" class="neutral">---</span>
    </div>
    <div id="news-list"><span style="color:#888;font-size:12px">データなし</span></div>
  </section>

  <section id="settings-section">
    <h2>取引設定</h2>

    <h3>リスク管理</h3>
    <div class="settings-grid">
      <label class="settings-field">最大BTC保有量<input type="number" id="s-max-position-btc" step="0.001" min="0.001"></label>
      <label class="settings-field">日次最大損失率<input type="number" id="s-max-daily-drawdown" step="0.01" min="0" max="1"></label>
      <label class="settings-field">ストップロス率<input type="number" id="s-stop-loss-pct" step="0.01" min="0" max="1"></label>
      <label class="settings-field">最小注文サイズ(BTC)<input type="number" id="s-min-order-size" step="0.001" min="0.001"></label>
    </div>

    <h3>シグナル</h3>
    <div class="settings-grid">
      <label class="settings-field">シグナル閾値<input type="number" id="s-signal-threshold" step="0.05" min="0" max="1"></label>
      <label class="settings-field">TA重み<input type="number" id="s-ta-weight" step="0.05" min="0" max="1"></label>
      <label class="settings-field">センチメント重み<input type="number" id="s-sentiment-weight" step="0.05" min="0" max="1"></label>
    </div>

    <h3>インジケータ</h3>
    <div class="settings-grid">
      <label class="settings-field">SMA期間<input type="number" id="s-sma-period" min="2" step="1"></label>
      <label class="settings-field">EMA期間<input type="number" id="s-ema-period" min="2" step="1"></label>
      <label class="settings-field">RSI期間<input type="number" id="s-rsi-period" min="2" step="1"></label>
      <label class="settings-field">MACD Fast<input type="number" id="s-macd-fast" min="2" step="1"></label>
      <label class="settings-field">MACD Slow<input type="number" id="s-macd-slow" min="3" step="1"></label>
      <label class="settings-field">MACDシグナル<input type="number" id="s-macd-signal" min="2" step="1"></label>
      <label class="settings-field">ボリンジャー期間<input type="number" id="s-bollinger-period" min="2" step="1"></label>
      <label class="settings-field">ボリンジャー標準偏差<input type="number" id="s-bollinger-std" step="0.1" min="0.1"></label>
    </div>

    <button id="settings-save-btn">保存</button>
    <span id="settings-msg"></span>
  </section>

  <section id="backtest-section">
    <h2>バックテスト</h2>
    <form id="backtest-form">
      <div class="bt-preset-group">
        <button type="button" class="bt-preset-btn" data-days="7">直近7日</button>
        <button type="button" class="bt-preset-btn" data-days="30">直近30日</button>
        <button type="button" class="bt-preset-btn" data-days="90">直近90日</button>
        <button type="button" class="bt-preset-btn" data-days="0">カスタム範囲</button>
      </div>
      <div id="bt-custom-range" class="bt-field-group">
        <label>開始日時<input type="datetime-local" id="bt-from"></label>
        <label>終了日時<input type="datetime-local" id="bt-to"></label>
      </div>
      <div class="bt-field-group">
        <label>解像度(秒)<input type="number" id="bt-resolution" value="60" min="1"></label>
        <label>スリッページ<input type="number" id="bt-slippage" value="0.001" step="0.0001" min="0"></label>
        <label>手数料<input type="number" id="bt-fee" value="0.0015" step="0.0001" min="0"></label>
        <label>初期資金(JPY)<input type="number" id="bt-initial-jpy" value="1000000" min="1"></label>
      </div>
      <button type="submit" id="bt-run-btn" disabled>実行</button>
      <span id="bt-loading" style="display:none">実行中...</span>
      <span id="bt-range-label"></span>
    </form>

    <div id="bt-result" style="display:none">
      <h3>最新結果</h3>
      <div class="bt-result-grid" id="bt-result-grid"></div>
    </div>

    <div id="bt-history">
      <h3>実行履歴</h3>
      <table>
        <thead>
          <tr><th>ID</th><th>リターン%</th><th>シャープ</th><th>最大DD%</th><th>勝率</th><th>取引数</th></tr>
        </thead>
        <tbody id="bt-history-body">
          <tr><td colspan="6" style="color:#888;text-align:center">データなし</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <div id="status-bar">
    <span>WebSocket: <span id="ws-status">切断</span></span>
    <span id="last-update"></span>
  </div>

  <script>
    const BASE = `${location.protocol}//${location.host}`;
    const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws/candles`;
    const JST_OFFSET = 9 * 3600;
    let useJST = true;

    function toChartTime(isoStr) {
      const ts = Math.floor(new Date(isoStr).getTime() / 1000);
      return useJST ? ts + JST_OFFSET : ts;
    }

    function makeTzFormatter(jst) {
      const offset = jst ? JST_OFFSET : 0;
      return (ts) => {
        const d = new Date((ts + offset) * 1000);
        return d.toISOString().slice(11, 16);
      };
    }

    // ── Chart setup ───────────────────────────────────────────────────────────

    const chartEl = document.getElementById('chart');
    const chartOpts = {
      layout: { background: { color: '#16213e' }, textColor: '#e0e0e0' },
      grid: { vertLines: { color: '#0f3460' }, horzLines: { color: '#0f3460' } },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#0f3460', minimumWidth: 90 },
      timeScale: { borderColor: '#0f3460', timeVisible: true, secondsVisible: false },
      localization: { timeFormatter: makeTzFormatter(useJST) },
    };

    const chart = LightweightCharts.createChart(chartEl, {
      ...chartOpts,
      width: chartEl.clientWidth,
      height: chartEl.clientHeight,
    });

    const candleSeries = chart.addCandlestickSeries({
      upColor: '#26a69a', downColor: '#ef5350',
      borderUpColor: '#26a69a', borderDownColor: '#ef5350',
      wickUpColor: '#26a69a', wickDownColor: '#ef5350',
    });

    // News fixed-position overlay series (separate hidden price scale, range 0-1)
    const newsFixedSeries = chart.addLineSeries({
      priceScaleId: 'news-overlay',
      color: 'transparent',
      lineWidth: 0,
      priceLineVisible: false,
      lastValueVisible: false,
      crosshairMarkerVisible: false,
      autoscaleInfoProvider: () => ({
        priceRange: { minValue: 0, maxValue: 1 },
        margins: { above: 0, below: 0 },
      }),
    });
    chart.priceScale('news-overlay').applyOptions({
      scaleMargins: { top: 0.0, bottom: 0.0 },
      visible: false,
    });

    // Indicator series on main chart
    const smaSeries = chart.addLineSeries({
      color: '#f9c74f', lineWidth: 1, visible: false,
      priceLineVisible: false, lastValueVisible: false,
    });
    const emaSeries = chart.addLineSeries({
      color: '#90e0ef', lineWidth: 1, visible: false,
      priceLineVisible: false, lastValueVisible: false,
    });
    const bbUpperSeries = chart.addLineSeries({
      color: '#c77dff', lineWidth: 1, lineStyle: 2, visible: false,
      priceLineVisible: false, lastValueVisible: false,
    });
    const bbMiddleSeries = chart.addLineSeries({
      color: '#c77dff', lineWidth: 1, visible: false,
      priceLineVisible: false, lastValueVisible: false,
    });
    const bbLowerSeries = chart.addLineSeries({
      color: '#c77dff', lineWidth: 1, lineStyle: 2, visible: false,
      priceLineVisible: false, lastValueVisible: false,
    });

    // RSI sub-chart
    const rsiEl = document.getElementById('rsi-chart');
    const rsiLabelEl = document.getElementById('rsi-label');
    const rsiChart = LightweightCharts.createChart(rsiEl, {
      ...chartOpts,
      width: rsiEl.clientWidth,
      height: 100,
      rightPriceScale: { borderColor: '#0f3460', scaleMargins: { top: 0.1, bottom: 0.1 }, minimumWidth: 90 },
    });
    const rsiSeries = rsiChart.addLineSeries({ color: '#ff9e6d', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
    const rsiOBSeries = rsiChart.addLineSeries({ color: '#ef5350', lineWidth: 1, lineStyle: 2, priceLineVisible: false, lastValueVisible: false });
    const rsiOSSeries = rsiChart.addLineSeries({ color: '#26a69a', lineWidth: 1, lineStyle: 2, priceLineVisible: false, lastValueVisible: false });

    // MACD sub-chart
    const macdEl = document.getElementById('macd-chart');
    const macdLabelEl = document.getElementById('macd-label');
    const macdChart = LightweightCharts.createChart(macdEl, {
      ...chartOpts,
      width: macdEl.clientWidth,
      height: 110,
      rightPriceScale: { borderColor: '#0f3460', scaleMargins: { top: 0.1, bottom: 0.1 }, minimumWidth: 90 },
    });
    const macdLineSeries   = macdChart.addLineSeries({ color: '#a8dadc', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
    const macdSignalSeries = macdChart.addLineSeries({ color: '#e94560', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
    const macdHistSeries   = macdChart.addHistogramSeries({ color: '#26a69a', priceLineVisible: false, lastValueVisible: false });

    // Sync time scales between sub-charts and main chart via logical range.
    // newsFixedSeries timestamps are snapped to candle times (see snapToCandle),
    // so all charts share the same logical index count and setVisibleLogicalRange
    // produces accurate alignment without zoom drift.
    // syncingRange flag prevents circular re-entrancy.
    let syncingRange = false;
    chart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncingRange || !range) return;
      syncingRange = true;
      rsiChart.timeScale().setVisibleLogicalRange(range);
      macdChart.timeScale().setVisibleLogicalRange(range);
      syncingRange = false;
      if (range.from <= 10) loadMoreHistory();
    });
    rsiChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncingRange || !range) return;
      syncingRange = true;
      chart.timeScale().setVisibleLogicalRange(range);
      macdChart.timeScale().setVisibleLogicalRange(range);
      syncingRange = false;
    });
    macdChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncingRange || !range) return;
      syncingRange = true;
      chart.timeScale().setVisibleLogicalRange(range);
      rsiChart.timeScale().setVisibleLogicalRange(range);
      syncingRange = false;
    });

    // ── Resize ────────────────────────────────────────────────────────────────

    function resizeCharts() {
      const container = document.getElementById('chart-container');
      const headerH = document.getElementById('chart-header').offsetHeight;
      const indBarH = document.getElementById('indicator-bar').offsetHeight;
      const rsiVisible = rsiEl.style.display !== 'none';
      const macdVisible = macdEl.style.display !== 'none';
      const rsiH = rsiVisible ? rsiEl.offsetHeight + rsiLabelEl.offsetHeight + 4 : 0;
      const macdH = macdVisible ? macdEl.offsetHeight + macdLabelEl.offsetHeight + 4 : 0;
      const totalPad = 24; // container padding top+bottom
      const gap = 8;
      const available = container.clientHeight - headerH - indBarH - rsiH - macdH - totalPad - gap;
      chart.applyOptions({ width: chartEl.clientWidth, height: Math.max(100, available) });
      if (rsiVisible) rsiChart.applyOptions({ width: rsiEl.clientWidth });
      if (macdVisible) macdChart.applyOptions({ width: macdEl.clientWidth });
    }

    window.addEventListener('resize', resizeCharts);

    // ── Indicator calculations ─────────────────────────────────────────────────

    function calcSMA(closes, period) {
      const result = [];
      for (let i = period - 1; i < closes.length; i++) {
        let sum = 0;
        for (let j = 0; j < period; j++) sum += closes[i - j];
        result.push({ idx: i, value: sum / period });
      }
      return result;
    }

    function calcEMA(closes, period) {
      if (closes.length < period) return [];
      const k = 2 / (period + 1);
      let ema = closes.slice(0, period).reduce((a, b) => a + b, 0) / period;
      const result = [{ idx: period - 1, value: ema }];
      for (let i = period; i < closes.length; i++) {
        ema = closes[i] * k + ema * (1 - k);
        result.push({ idx: i, value: ema });
      }
      return result;
    }

    function calcBB(closes, period, stdK) {
      const sma = calcSMA(closes, period);
      return sma.map(({ idx, value: mean }) => {
        let variance = 0;
        for (let j = 0; j < period; j++) variance += Math.pow(closes[idx - j] - mean, 2);
        const sd = Math.sqrt(variance / period);
        return { idx, upper: mean + stdK * sd, middle: mean, lower: mean - stdK * sd };
      });
    }

    function calcRSI(closes, period) {
      if (closes.length < period + 1) return [];
      let gains = 0, losses = 0;
      for (let i = 1; i <= period; i++) {
        const diff = closes[i] - closes[i - 1];
        if (diff >= 0) gains += diff; else losses -= diff;
      }
      let avgGain = gains / period;
      let avgLoss = losses / period;
      const result = [];
      const rsiVal = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
      result.push({ idx: period, value: rsiVal });
      for (let i = period + 1; i < closes.length; i++) {
        const diff = closes[i] - closes[i - 1];
        const gain = diff > 0 ? diff : 0;
        const loss = diff < 0 ? -diff : 0;
        avgGain = (avgGain * (period - 1) + gain) / period;
        avgLoss = (avgLoss * (period - 1) + loss) / period;
        const rsi = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
        result.push({ idx: i, value: rsi });
      }
      return result;
    }

    function calcMACD(closes, fast, slow, signal) {
      const emaFast = calcEMA(closes, fast);
      const emaSlow = calcEMA(closes, slow);
      const slowStart = slow - 1;
      const macdLine = [];
      emaSlow.forEach(({ idx, value: slowVal }) => {
        const fastEntry = emaFast.find(e => e.idx === idx);
        if (fastEntry) macdLine.push({ idx, value: fastEntry.value - slowVal });
      });
      if (macdLine.length < signal) return { macd: macdLine, sig: [], hist: [] };
      const macdValues = macdLine.map(e => e.value);
      const k = 2 / (signal + 1);
      let sigEma = macdValues.slice(0, signal).reduce((a, b) => a + b, 0) / signal;
      const sigLine = [{ idx: macdLine[signal - 1].idx, value: sigEma }];
      for (let i = signal; i < macdLine.length; i++) {
        sigEma = macdValues[i] * k + sigEma * (1 - k);
        sigLine.push({ idx: macdLine[i].idx, value: sigEma });
      }
      const hist = sigLine.map((s, i) => {
        const m = macdLine.find(e => e.idx === s.idx);
        const diff = m ? m.value - s.value : 0;
        return { idx: s.idx, value: diff };
      });
      return { macd: macdLine, sig: sigLine, hist };
    }

    // ── Signal panel (Rust SignalEngine API) ──────────────────────────────────

    function signalClass(s) {
      return s === 'BUY' ? 'signal-buy' : s === 'SELL' ? 'signal-sell' : 'signal-hold';
    }

    function parseSignal(raw) {
      if (!raw || raw === 'Hold') return { kind: 'HOLD', confidence: null, price: null };
      if (raw.Buy) return { kind: 'BUY', confidence: raw.Buy.confidence, price: raw.Buy.price };
      if (raw.Sell) return { kind: 'SELL', confidence: raw.Sell.confidence, price: raw.Sell.price };
      return { kind: 'HOLD', confidence: null, price: null };
    }

    function renderSignalPanel(detail) {
      const compEl = document.getElementById('signal-composite-value');
      const confEl = document.getElementById('signal-confidence');
      const rowsEl = document.getElementById('signal-rows');

      if (detail === null || detail === undefined) {
        compEl.textContent = '---';
        compEl.className = 'signal-hold';
        confEl.textContent = 'シグナル待機中';
        rowsEl.innerHTML = '';
        return;
      }

      const agg = parseSignal(detail.aggregate);
      compEl.textContent = agg.kind === 'BUY' ? '買いシグナル↑' : agg.kind === 'SELL' ? '売りシグナル↓' : '様子見→';
      compEl.className = signalClass(agg.kind);
      confEl.textContent = agg.confidence != null
        ? `信頼度 ${(agg.confidence * 100).toFixed(0)}% (Rust SignalEngine)`
        : '(Rust SignalEngine)';

      const indicators = detail.indicators || [];
      const indRows = indicators.map(ind => {
        const s = parseSignal(ind.signal);
        const badge = s.kind === 'HOLD' ? '－' : s.kind === 'BUY' ? '▲' : '▼';
        const cls = signalClass(s.kind);
        const conf = s.confidence != null ? ` ${(s.confidence * 100).toFixed(0)}%` : '';
        return `<div class="signal-row">
          <span class="signal-name">${ind.name}</span>
          <span class="signal-detail"></span>
          <span class="signal-badge ${cls}">${badge}${conf}</span>
        </div>`;
      }).join('');

      const priceRow = agg.price ? `<div class="signal-row">
          <span class="signal-name">価格</span>
          <span class="signal-detail">${Number(agg.price).toLocaleString('ja-JP')}</span>
          <span class="signal-badge"></span>
        </div>` : '';

      rowsEl.innerHTML = indRows + priceRow;
    }

    // ── Global state ──────────────────────────────────────────────────────────

    let candleData = [];
    let isLoadingHistory = false;
    let hasMoreHistory = true;

    async function loadMoreHistory() {
      if (isLoadingHistory || !hasMoreHistory || candleData.length === 0) return;
      isLoadingHistory = true;
      const oldestTime = candleData[0].time; // Unix seconds
      const to = new Date(oldestTime * 1000).toISOString();
      const url = `${BASE}/api/candles?resolution=60&count=200&to=${encodeURIComponent(to)}`;
      try {
        const res = await fetch(url);
        if (!res.ok) return;
        const candles = await res.json();
        if (candles.length === 0) { hasMoreHistory = false; return; }
        const newData = candles
          .map(c => ({
            time: toChartTime(c.open_time),
            open: parseFloat(c.open), high: parseFloat(c.high),
            low: parseFloat(c.low), close: parseFloat(c.close),
          }))
          .filter(c => c.time < candleData[0].time)
          .sort((a, b) => a.time - b.time);
        if (newData.length === 0) { hasMoreHistory = false; return; }
        candleData = [...newData, ...candleData];
        candleSeries.setData(candleData);
        renderIndicators();
      } catch (e) {
        console.warn('History load error', e);
      } finally {
        isLoadingHistory = false;
      }
    }

    let currentCfg = {
      sma_period: 20, ema_period: 20, rsi_period: 14,
      macd_fast: 12, macd_slow: 26, macd_signal: 9,
      bollinger_period: 20, bollinger_std: 2.0,
    };

    function renderIndicators() {
      if (candleData.length === 0) return;

      // Capture current visible logical range BEFORE setData() calls, and block subscriptions
      // to prevent circular range corruption while data is being updated.
      const savedRange = chart.timeScale().getVisibleLogicalRange();
      syncingRange = true;

      const closes = candleData.map(c => c.close);
      const times  = candleData.map(c => c.time);

      const showSMA  = document.getElementById('cb-sma').checked;
      const showEMA  = document.getElementById('cb-ema').checked;
      const showBB   = document.getElementById('cb-bb').checked;
      const showRSI  = document.getElementById('cb-rsi').checked;
      const showMACD = document.getElementById('cb-macd').checked;

      // SMA
      smaSeries.applyOptions({ visible: showSMA });
      if (showSMA) {
        const sma = calcSMA(closes, currentCfg.sma_period);
        smaSeries.setData(sma.map(({ idx, value }) => ({ time: times[idx], value })));
      }

      // EMA
      emaSeries.applyOptions({ visible: showEMA });
      if (showEMA) {
        const ema = calcEMA(closes, currentCfg.ema_period);
        emaSeries.setData(ema.map(({ idx, value }) => ({ time: times[idx], value })));
      }

      // Bollinger Bands
      bbUpperSeries.applyOptions({ visible: showBB });
      bbMiddleSeries.applyOptions({ visible: showBB });
      bbLowerSeries.applyOptions({ visible: showBB });
      if (showBB) {
        const bb = calcBB(closes, currentCfg.bollinger_period, currentCfg.bollinger_std);
        bbUpperSeries.setData(bb.map(({ idx, upper })  => ({ time: times[idx], value: upper })));
        bbMiddleSeries.setData(bb.map(({ idx, middle }) => ({ time: times[idx], value: middle })));
        bbLowerSeries.setData(bb.map(({ idx, lower })  => ({ time: times[idx], value: lower })));
      }

      // RSI sub-chart
      rsiEl.style.display = showRSI ? 'block' : 'none';
      rsiLabelEl.style.display = showRSI ? 'block' : 'none';
      if (showRSI) {
        const rsi = calcRSI(closes, currentCfg.rsi_period);
        // Pad with null for missing initial periods so logical indices align with main chart
        const rsiPad = times.slice(0, times.length - rsi.length).map(t => ({ time: t, value: null }));
        rsiSeries.setData([...rsiPad, ...rsi.map(({ idx, value }) => ({ time: times[idx], value }))]);
        const obPad = rsiPad.map(({ time }) => ({ time, value: null }));
        const obData = rsi.map(({ idx }) => ({ time: times[idx], value: 70 }));
        const osData = rsi.map(({ idx }) => ({ time: times[idx], value: 30 }));
        rsiOBSeries.setData([...obPad, ...obData]);
        rsiOSSeries.setData([...obPad, ...osData]);
      }

      // MACD sub-chart
      macdEl.style.display = showMACD ? 'block' : 'none';
      macdLabelEl.style.display = showMACD ? 'block' : 'none';
      if (showMACD) {
        const { macd, sig, hist } = calcMACD(
          closes,
          currentCfg.macd_fast, currentCfg.macd_slow, currentCfg.macd_signal
        );
        const macdPad = times.slice(0, times.length - macd.length).map(t => ({ time: t, value: null }));
        const sigPad  = times.slice(0, times.length - sig.length).map(t => ({ time: t, value: null }));
        macdLineSeries.setData([...macdPad, ...macd.map(({ idx, value }) => ({ time: times[idx], value }))]);
        macdSignalSeries.setData([...sigPad, ...sig.map(({ idx, value }) => ({ time: times[idx], value }))]);
        macdHistSeries.setData([...sigPad, ...hist.map(({ idx, value }) => ({
          time: times[idx], value,
          color: value >= 0 ? '#26a69a' : '#ef5350',
        }))]);
      }

      // Restore blocked subscriptions and apply the saved logical range to all charts
      syncingRange = false;
      if (savedRange) {
        syncingRange = true;
        chart.timeScale().setVisibleLogicalRange(savedRange);
        if (showRSI)  rsiChart.timeScale().setVisibleLogicalRange(savedRange);
        if (showMACD) macdChart.timeScale().setVisibleLogicalRange(savedRange);
        syncingRange = false;
      }
      resizeCharts();
    }

        const res = await fetch(`${BASE}/api/candles?resolution=60&count=200`);

    // ── Trade markers ─────────────────────────────────────────────────────────

    let currentPrice = null;
    let jpyAvailable = null;
    let btcAvailable = null;

    function updateTotalBalance() {
      if (currentPrice === null || jpyAvailable === null || btcAvailable === null) return;
      const total = jpyAvailable + btcAvailable * currentPrice;
      document.getElementById('total-balance-jpy').textContent =
        total.toLocaleString('ja-JP', { maximumFractionDigits: 0 });
    }

    let tradeMarkers = [];
    let newsMarkers = [];

    function applyAllMarkers() {
      candleSeries.setMarkers(tradeMarkers);
      const showNews = document.getElementById('cb-news').checked;
      newsFixedSeries.setMarkers(showNews ? newsMarkers : []);
    }

    function updateTradeMarkers(orders) {
      tradeMarkers = orders
        .map(o => ({
          time: toChartTime(o.created_at),
          position: o.side === 'BUY' ? 'belowBar' : 'aboveBar',
          color: o.side === 'BUY' ? '#26a69a' : '#ef5350',
          shape: o.side === 'BUY' ? 'arrowUp' : 'arrowDown',
          text: o.side === 'BUY'
            ? `買 ${Number(o.size).toFixed(4)}`
            : `売 ${Number(o.size).toFixed(4)}`,
        }))
        .sort((a, b) => a.time - b.time);
      applyAllMarkers();
    }

    // Snap an arbitrary timestamp to the nearest candle time so that
    // newsFixedSeries does not introduce extra logical indices into the main
    // chart's time scale, keeping it in sync with RSI/MACD sub-charts.
    function snapToCandle(t) {
      if (candleData.length === 0) return t;
      return candleData.reduce((best, c) =>
        Math.abs(c.time - t) < Math.abs(best - t) ? c.time : best,
        candleData[0].time
      );
    }

    function updateNewsMarkers(items) {
      const fixedData = [];
      const markers = [];

      items
        .filter(item => item.score > 0.1 || item.score < -0.1)
        .forEach(item => {
          const isBullish = item.score > 0.1;
          const timeStr = item.published_at || item.analyzed_at;
          if (!timeStr) return;
          const t = snapToCandle(toChartTime(timeStr));

          fixedData.push({ time: t, value: isBullish ? 0.05 : 0.95 });
          markers.push({
            time: t,
            position: 'inBar',
            color: isBullish ? '#26a69a' : '#ef5350',
            shape: isBullish ? 'arrowUp' : 'arrowDown',
            text: isBullish ? '強気' : '弱気',
            size: 1,
          });
        });

      // 同一時刻の重複を排除してソート（setData の要件）
      const dedupData = [...new Map(fixedData.map(d => [d.time, d])).values()]
        .sort((a, b) => a.time - b.time);
      newsFixedSeries.setData(dedupData);

      newsMarkers = markers.sort((a, b) => a.time - b.time);
      applyAllMarkers();
    }

    // ── WebSocket for real-time candles ───────────────────────────────────────

    let ws = null;
    function connectWS() {
      ws = new WebSocket(WS_URL);
      const statusEl = document.getElementById('ws-status');

      ws.onopen = () => {
        statusEl.textContent = '接続中';
        statusEl.className = 'connected';
      };

      ws.onmessage = (evt) => {
        try {
          const c = JSON.parse(evt.data);
          const bar = {
            time: toChartTime(c.open_time),
            open: parseFloat(c.open), high: parseFloat(c.high),
            low: parseFloat(c.low), close: parseFloat(c.close),
          };
          candleSeries.update(bar);
          // Update candleData
          const idx = candleData.findIndex(d => d.time === bar.time);
          if (idx >= 0) {
            candleData[idx] = bar;
          } else {
            candleData.push(bar);
            candleData.sort((a, b) => a.time - b.time);
          }
          renderIndicators();
          document.getElementById('price').textContent = Number(c.close).toLocaleString('ja-JP');
          currentPrice = Number(c.close);
          updateTotalBalance();
          const nowStr = useJST
            ? new Date().toLocaleTimeString('ja-JP')
            : new Date().toUTCString().slice(17, 25) + ' UTC';
          document.getElementById('last-update').textContent = '最終更新: ' + nowStr;
        } catch (e) { console.warn('ws parse error', e); }
      };

      ws.onclose = () => {
        statusEl.textContent = '切断';
        statusEl.className = '';
        setTimeout(connectWS, 3000);
      };

      ws.onerror = () => ws.close();
    }

    // ── Backtest プリセット ────────────────────────────────────────────────────

    function toInputDatetime(date) {
      const p = n => String(n).padStart(2, '0');
      return `${date.getFullYear()}-${p(date.getMonth()+1)}-${p(date.getDate())}T${p(date.getHours())}:${p(date.getMinutes())}`;
    }

    function applyPreset(btn) {
      document.querySelectorAll('.bt-preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const days = parseInt(btn.dataset.days);
      const customDiv = document.getElementById('bt-custom-range');
      const label = document.getElementById('bt-range-label');
      if (days === 0) {
        customDiv.style.display = '';
        label.textContent = '';
        document.getElementById('bt-run-btn').disabled = !(
          document.getElementById('bt-from').value && document.getElementById('bt-to').value
        );
      } else {
        customDiv.style.display = 'none';
        const to   = new Date();
        const from = new Date(to.getTime() - days * 86400 * 1000);
        document.getElementById('bt-from').value = toInputDatetime(from);
        document.getElementById('bt-to').value   = toInputDatetime(to);
        const fmt = d => d.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' });
        label.textContent = `${fmt(from)} 〜 ${fmt(to)}`;
        document.getElementById('bt-run-btn').disabled = false;
      }
    }

    document.querySelectorAll('.bt-preset-btn').forEach(btn =>
      btn.addEventListener('click', () => applyPreset(btn))
    );

    ['bt-from', 'bt-to'].forEach(id =>
      document.getElementById(id).addEventListener('change', () => {
        const f = document.getElementById('bt-from').value;
        const t = document.getElementById('bt-to').value;
        document.getElementById('bt-run-btn').disabled = !(f && t);
      })
    );

    async function runBacktest(e) {
      e.preventDefault();
      const btn = document.getElementById('bt-run-btn');
      const loading = document.getElementById('bt-loading');
      btn.disabled = true;
      loading.style.display = 'inline';

      const fromVal = document.getElementById('bt-from').value;
      const toVal = document.getElementById('bt-to').value;
      if (!fromVal || !toVal) {
        alert('日時範囲を選択してください');
        btn.disabled = false;
        loading.style.display = 'none';
        return;
      }
      const body = {
        from: new Date(fromVal).toISOString(),
        to: new Date(toVal).toISOString(),
        resolution_secs: parseInt(document.getElementById('bt-resolution').value),
        slippage_pct: parseFloat(document.getElementById('bt-slippage').value),
        fee_pct: parseFloat(document.getElementById('bt-fee').value),
        initial_jpy: document.getElementById('bt-initial-jpy').value,
      };

      try {
        const res = await fetch(`${BASE}/api/backtest`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          alert(`エラー: ${err.error || res.status}`);
          return;
        }
        const data = await res.json();
        renderBacktestResult(data.report);
        await loadBacktestHistory();
      } catch (err) {
        alert('通信エラー: ' + err.message);
      } finally {
        btn.disabled = false;
        loading.style.display = 'none';
      }
    }

    document.getElementById('backtest-form').addEventListener('submit', runBacktest);
    loadBacktestHistory();

    // ── News Sentiment ────────────────────────────────────────────────────────

    async function loadNews() {
      try {
        const res = await fetch(`${BASE}/api/news/latest`);
        const items = await res.json();
        const listEl = document.getElementById('news-list');
        const avgEl = document.getElementById('news-avg-score');

        if (!items.length) {
          listEl.innerHTML = '<span style="color:#888;font-size:12px">データなし (Ollamaが未起動の場合はスコア0で表示されます)</span>';
          avgEl.textContent = '---';
          return;
        }

        const avg = items.reduce((s, i) => s + i.score, 0) / items.length;
        avgEl.textContent = avg.toFixed(2);
        avgEl.className = avg > 0.1 ? 'up' : avg < -0.1 ? 'down' : 'neutral';

        updateNewsMarkers(items);

        listEl.innerHTML = items.map(item => {
          const s = item.score;
          const badgeClass = s > 0.1 ? 'news-score-bullish' : s < -0.1 ? 'news-score-bearish' : 'news-score-neutral';
          const label = s > 0.1 ? '強気' : s < -0.1 ? '弱気' : '中立';
          const t = new Date(item.published_at || item.analyzed_at);
          const timeStr = `${t.getMonth()+1}/${t.getDate()} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
          return `<div class="news-item">
            <span class="news-score-badge ${badgeClass}">${label}</span>
            <span class="news-headline">${item.headline}</span>
            <span class="news-time">${timeStr}</span>
          </div>`;
        }).join('');
      } catch (e) { console.warn('news load failed', e); }
    }

    loadNews();
    setInterval(loadNews, 30000);

    // ── Settings ──────────────────────────────────────────────────────────────

    function setSettingsMsg(text, isOk) {
      const el = document.getElementById('settings-msg');
      el.textContent = text;
      el.className = isOk ? 'ok' : 'err';
      if (isOk) setTimeout(() => { el.textContent = ''; }, 3000);
    }

    async function loadSettings() {
      try {
        const res = await fetch(`${BASE}/api/config`);
        if (!res.ok) { setSettingsMsg('設定の読み込みに失敗しました', false); return; }
        const cfg = await res.json();
        document.getElementById('s-max-position-btc').value = cfg.max_position_btc;
        document.getElementById('s-max-daily-drawdown').value = cfg.max_daily_drawdown;
        document.getElementById('s-stop-loss-pct').value = cfg.stop_loss_pct;
        document.getElementById('s-min-order-size').value = cfg.min_order_size;
        document.getElementById('s-signal-threshold').value = cfg.signal_threshold;
        document.getElementById('s-ta-weight').value = cfg.ta_weight;
        document.getElementById('s-sentiment-weight').value = cfg.sentiment_weight;
        document.getElementById('s-sma-period').value = cfg.sma_period;
        document.getElementById('s-ema-period').value = cfg.ema_period;
        document.getElementById('s-rsi-period').value = cfg.rsi_period;
        document.getElementById('s-macd-fast').value = cfg.macd_fast;
        document.getElementById('s-macd-slow').value = cfg.macd_slow;
        document.getElementById('s-macd-signal').value = cfg.macd_signal;
        document.getElementById('s-bollinger-period').value = cfg.bollinger_period;
        document.getElementById('s-bollinger-std').value = cfg.bollinger_std;
        // Sync indicator periods to global cfg
        currentCfg = {
          sma_period:      cfg.sma_period,
          ema_period:      cfg.ema_period,
          rsi_period:      cfg.rsi_period,
          macd_fast:       cfg.macd_fast,
          macd_slow:       cfg.macd_slow,
          macd_signal:     cfg.macd_signal,
          bollinger_period: cfg.bollinger_period,
          bollinger_std:   cfg.bollinger_std,
        };
        renderIndicators();
      } catch (e) { setSettingsMsg('設定の読み込みに失敗しました: ' + e.message, false); }
    }

    async function saveSettings() {
      const btn = document.getElementById('settings-save-btn');
      btn.disabled = true;
      const cfg = {
        max_position_btc: parseFloat(document.getElementById('s-max-position-btc').value),
        max_daily_drawdown: parseFloat(document.getElementById('s-max-daily-drawdown').value),
        stop_loss_pct: parseFloat(document.getElementById('s-stop-loss-pct').value),
        min_order_size: parseFloat(document.getElementById('s-min-order-size').value),
        signal_threshold: parseFloat(document.getElementById('s-signal-threshold').value),
        ta_weight: parseFloat(document.getElementById('s-ta-weight').value),
        sentiment_weight: parseFloat(document.getElementById('s-sentiment-weight').value),
        sma_period: parseInt(document.getElementById('s-sma-period').value),
        ema_period: parseInt(document.getElementById('s-ema-period').value),
        rsi_period: parseInt(document.getElementById('s-rsi-period').value),
        macd_fast: parseInt(document.getElementById('s-macd-fast').value),
        macd_slow: parseInt(document.getElementById('s-macd-slow').value),
        macd_signal: parseInt(document.getElementById('s-macd-signal').value),
        bollinger_period: parseInt(document.getElementById('s-bollinger-period').value),
        bollinger_std: parseFloat(document.getElementById('s-bollinger-std').value),
      };
      try {
        const res = await fetch(`${BASE}/api/config`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(cfg),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          setSettingsMsg('エラー: ' + (err.error || res.status), false);
          return;
        }
        setSettingsMsg('保存しました', true);
        // Update global cfg and re-render indicators
        currentCfg = {
          sma_period:      cfg.sma_period,
          ema_period:      cfg.ema_period,
          rsi_period:      cfg.rsi_period,
          macd_fast:       cfg.macd_fast,
          macd_slow:       cfg.macd_slow,
          macd_signal:     cfg.macd_signal,
          bollinger_period: cfg.bollinger_period,
          bollinger_std:   cfg.bollinger_std,
        };
        renderIndicators();
      } catch (e) {
        setSettingsMsg('通信エラー: ' + e.message, false);
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('settings-save-btn').addEventListener('click', saveSettings);
    loadSettings();

    // ── Indicator checkbox listeners ──────────────────────────────────────────

    ['cb-sma', 'cb-ema', 'cb-bb', 'cb-rsi', 'cb-macd'].forEach(id => {
      document.getElementById(id).addEventListener('change', renderIndicators);
    });

    document.getElementById('cb-news').addEventListener('change', applyAllMarkers);

    // ── Timezone toggle ───────────────────────────────────────────────────────

    document.getElementById('tz-toggle').addEventListener('click', () => {
      useJST = !useJST;
      document.getElementById('tz-toggle').textContent = useJST ? 'JST' : 'UTC';
      const tzFmt = makeTzFormatter(useJST);
      chart.applyOptions({ localization: { timeFormatter: tzFmt } });
      rsiChart.applyOptions({ localization: { timeFormatter: tzFmt } });
      macdChart.applyOptions({ localization: { timeFormatter: tzFmt } });
      loadCandles();
      loadOrders();
      loadNews();
      loadSignal();
    });

    // ── Init ──────────────────────────────────────────────────────────────────

    loadCandles();
    loadTicker();
    loadBalance();
    loadOrders();
    loadSignal();
    connectWS();

    setInterval(loadTicker, 5000);
    setInterval(loadBalance, 15000);
    setInterval(loadOrders, 10000);
    setInterval(loadSignal, 5000);

    // Initial resize after layout settles
    setTimeout(resizeCharts, 100);
  </script>
</body>
</html>
