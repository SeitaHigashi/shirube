name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu --bin shirube

      - name: Package binary
        run: |
          TAG=${GITHUB_REF_NAME}           # e.g. "v0.2.0"
          VERSION=${TAG#v}                  # strip leading "v" → "0.2.0"
          ASSET="shirube-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar czf "${ASSET}" \
            -C target/x86_64-unknown-linux-gnu/release \
            shirube
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
